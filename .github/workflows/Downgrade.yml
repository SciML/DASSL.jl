name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    # Disabled: strict downgrade (allow-reresolve: false) is floor-unfixable here,
    # and every fix requires LOWERING a floor (forbidden). All of DASSL's direct
    # deps are already pinned at their registry maximums (DiffEqBase 7.5.5,
    # SciMLBase 3.18.0, NonlinearSolve 4.19.1, ArrayInterface 7.25.0), so raising
    # floors changes nothing. The main manifest resolves to LogExpFunctions 1.0.1,
    # pulled hard only by NonlinearSolveBase 2.30.3 (latest), via
    # DiffEqBase 7.5.5 -> BracketingNonlinearSolve 1.12.1 -> NonlinearSolveBase.
    # The test target's NonlinearSolve floor (4.19.1) needs ForwardDiff 1.x, and
    # ForwardDiff (every version 0.10.23-1.3.3) HARD-requires LogExpFunctions = "0.3"
    # (< 1.0). The strict test sandbox preserves LogExpFunctions 1.0.1 from the main
    # manifest and may not re-resolve, so ForwardDiff is Unsatisfiable. Forcing the
    # main manifest to LogExpFunctions 0.3 would need either NonlinearSolveBase <= 2.28
    # (which caps LogExpFunctions < 1.0) -- reachable only by an OLDER DiffEqBase /
    # BracketingNonlinearSolve, i.e. lowering a floor -- or a direct hard ForwardDiff
    # dep, which only DiffEqBase 6.71-6.161 (below the 7.5.5 floor) provides, or
    # adding ForwardDiff to [deps] (forbidden). No RAISED-floor assignment resolves
    # under strict; a free re-resolve picks LogExpFunctions 0.3.29 / ForwardDiff 1.3.3
    # and passes, but re-resolution is not permitted.
    if: false
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"
