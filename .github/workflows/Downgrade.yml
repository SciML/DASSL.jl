name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    # Runs strict downgrade (allow_reresolve=false). Expected RED until the upstream
    # fix releases (ForwardDiff/LogExpFunctions — red until ForwardDiff 1.3.4 (#811)
    # releases); will auto-green on that release. The failure is intentional/natural,
    # not disabled.
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"
