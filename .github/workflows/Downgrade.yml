name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    # Disabled: strict downgrade (allow-reresolve: false) cannot resolve at the
    # current [compat] floors. julia-buildpkg pins the main manifest to
    # LogExpFunctions 1.0.1 (the only version DASSL's direct deps select), which
    # caps ForwardDiff at <=0.10.22. The test target's NonlinearSolve floor
    # (4.19.1) requires ForwardDiff 1.x, so the strict test sandbox -- which
    # preserves the main manifest and may not re-resolve -- has no satisfiable
    # ForwardDiff version. A free re-resolve would pick LogExpFunctions 0.3.29 /
    # ForwardDiff 1.3.3 and the suite passes, but re-resolution is not permitted
    # and lowering floors is not an option. Re-enable once the floors
    # can be raised so the main manifest selects a ForwardDiff-1.x-compatible
    # LogExpFunctions without re-resolution.
    if: false
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"
