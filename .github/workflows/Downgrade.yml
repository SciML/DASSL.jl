name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    # Disabled: strict downgrade (allow-reresolve: false) is floor-unfixable here;
    # every resolving fix requires LOWERING a floor or adding a transitive to [deps]
    # (both forbidden). All of DASSL's direct deps that touch this conflict are
    # already at their registry maximums (DiffEqBase 7.5.5, SciMLBase 3.18.0,
    # ArrayInterface 7.25.0, SymbolicIndexingInterface 0.3.48, Reexport 1.2.2), so
    # there is no headroom to raise; the only deps with headroom (PrecompileTools,
    # SciMLLogging) have no LogExpFunctions/ForwardDiff edge and were verified to not
    # change the outcome. The main manifest resolves to LogExpFunctions 1.0.1: it is
    # pulled only by NonlinearSolveBase (via DiffEqBase 7.5.5 ->
    # BracketingNonlinearSolve 1.12.1 -> NonlinearSolveBase 2.30.3), and
    # NonlinearSolveBase 2.29-2 permits LogExpFunctions in [0.3.29-0.3, 1], so the
    # resolver greedily picks 1.0.1. No ForwardDiff edge exists in the main env, so
    # nothing forces LogExpFunctions down. The test target's NonlinearSolve floor
    # (4.19.1, via NonlinearSolveBase 2.30.3) needs ForwardDiff 0.10.36-1.3.3, and
    # ForwardDiff (every version 0.10.23-1) HARD-requires LogExpFunctions = "0.3"
    # (< 1.0). The strict test sandbox preserves LogExpFunctions 1.0.1 from the main
    # manifest and may not re-resolve, so ForwardDiff is Unsatisfiable. Forcing the
    # main manifest to LogExpFunctions 0.3 would need NonlinearSolveBase <= 2.28
    # (caps LogExpFunctions < 1.0) -- reachable only via an OLDER DiffEqBase /
    # BracketingNonlinearSolve, i.e. lowering a floor -- or a direct hard ForwardDiff
    # dep, which only DiffEqBase 6.71-6.161 (below the 7.5.5 floor) provides, or
    # adding ForwardDiff to [deps] (forbidden). No RAISED-floor assignment resolves
    # under strict; a free re-resolve picks LogExpFunctions 0.3.29 / ForwardDiff 1.3.3
    # and passes, but re-resolution is not permitted.
    if: false
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"
